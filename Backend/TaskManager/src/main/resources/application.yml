server:
  port: ${PORT:5001}
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: 9a67471b7964197d028290c6096530664987016209e999c64264639912061203
  expiration: 86400000 # 1 day

logging:
  level:
    org.springframework.security: DEBUG
