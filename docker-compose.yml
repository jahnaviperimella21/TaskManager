version: "3.8"

services:
  backend:
    build:
      context: ./Backend/TaskManager
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - taskmanager-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - taskmanager-network

networks:
  taskmanager-network:
    driver: bridge
